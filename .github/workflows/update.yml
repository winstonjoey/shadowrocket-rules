name: Shadowrocket Production Update

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. 拉取仓库
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # 2. 下载官方配置
      # =========================
      - name: Download base config
        run: |
          mkdir -p base
          curl -L -o base.conf \
          https://johnshall.github.io/Shadowrocket-ADBlock-Rules-Forever/sr_top500_banlist_ad.conf

      # =========================
      # 3. 生成工作文件
      # =========================
      - name: Prepare config
        run: |
          cp base.conf work.conf

      # =========================
      # 4. 插入 RULE-SET（正确位置）
      # =========================
      - name: Inject RULE-SET
        run: |
          awk '
          BEGIN {inserted=0}

          /^\[Rule\]/ {
            print
            print ""
            print "# ===== Custom RULE-SET ====="
            print "RULE-SET,https://adrules.top/adrules_domainset.txt,REJECT"
            print "RULE-SET,https://adrules.top/adrules.list,REJECT"
            print "RULE-SET,https://raw.githubusercontent.com/217heidai/adblockfilters/main/rules/adblockdns.txt,REJECT"
            print "RULE-SET,https://anti-ad.net/surge2.txt,REJECT"
            inserted=1
            next
          }

          {print}
          ' work.conf > tmp.conf && mv tmp.conf work.conf

      # =========================
      # 5. 添加 DNS（你要求的）
      # =========================
      - name: Add DNS (AdGuard DoH)
        run: |
          awk '
          BEGIN {in_general=0; added=0}

          /^\[General\]/ {
            print
            in_general=1
            next
          }

          in_general && /^dns-server/ {
            print "dns-server = https://dns.adguard-dns.com/dns-query"
            added=1
            next
          }

          {print}
          ' work.conf > tmp.conf

          mv tmp.conf work.conf

      # =========================
      # 6. 修复 update-url
      # =========================
      - name: Fix update-url
        run: |
          REPO_URL="https://raw.githubusercontent.com/winstonjoey/shadowrocket-rules/main/sr_top500_banlist_ad_custom.conf"

          if grep -q "^update-url" work.conf; then
            sed -i "s|^update-url.*|update-url,${REPO_URL}|" work.conf
          else
            echo "update-url,${REPO_URL}" >> work.conf
          fi

      # =========================
      # 7. 输出文件
      # =========================
      - name: Export final config
        run: |
          mv work.conf sr_top500_banlist_ad_custom.conf

      # =========================
      # 8. 提交
      # =========================
      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add sr_top500_banlist_ad_custom.conf base.conf

          git commit -m "auto: add AdGuard DNS + rules" || echo "no changes"
          git push
